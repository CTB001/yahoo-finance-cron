name: Metal Prices Mail

on:
  schedule:
    - cron: "0 7 * * 1-5"   # 10:00 TR
    - cron: "0 13 * * 1-5"  # 16:00 TR
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install yfinance pandas openpyxl pytz

      - run: python main.py
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
